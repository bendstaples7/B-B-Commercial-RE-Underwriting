name: CI re-run job

# Re-run a single CI job without re-running the full workflow matrix.
on:
  workflow_dispatch:
    inputs:
      job:
        description: Job to re-run
        required: true
        type: choice
        options:
          - backend
          - frontend
          - backend-performance

permissions:
  contents: read

jobs:
  backend:
    if: inputs.job == 'backend'
    name: Backend — pytest (re-run)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt
        working-directory: backend
      - run: python -c "import celery_worker; print('celery_worker imports OK')"
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          FLASK_ENV: testing
          SECRET_KEY: ci-test-secret-key
          JWT_SECRET_KEY: ci-test-jwt-secret
          CELERY_BROKER_URL: redis://localhost:6379/0
          REDIS_URL: redis://localhost:6379/0
      - run: python scripts/lint_migrations.py
        working-directory: backend
      - run: pytest --junitxml=pytest-results.xml
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          FLASK_ENV: testing
          SECRET_KEY: ci-test-secret-key
          JWT_SECRET_KEY: ci-test-jwt-secret

  frontend:
    if: inputs.job == 'frontend'
    name: Frontend — typecheck, build, tests (re-run)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci || npm ci || npm ci
        working-directory: frontend
      - run: npm install --no-save @rollup/rollup-linux-x64-gnu
        working-directory: frontend
      - run: npx tsc --noEmit
        working-directory: frontend
      - run: npm test -- --reporter=default --reporter=junit --outputFile=junit.xml
        working-directory: frontend
      - run: npm run build
        working-directory: frontend

  backend-performance:
    if: inputs.job == 'backend-performance'
    name: Backend — performance tests (re-run)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt
        working-directory: backend
      - run: pytest -m performance -o addopts= --junitxml=pytest-performance-results.xml
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          FLASK_ENV: testing
          SECRET_KEY: ci-test-secret-key
          JWT_SECRET_KEY: ci-test-jwt-secret
