# .github/workflows/deploy.yml
name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [frontend, backend]

    steps:
      - name: Load SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS to known hosts
        run: ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          ssh $VPS_USER@$VPS_HOST << 'ENDSSH'
            set -euo pipefail
            cd /home/deploy/app

            echo "==> (1) Pull latest code"
            git pull origin main

            echo "==> (2) Install Python dependencies"
            pip install --user -r backend/requirements.txt

            echo "==> (3) Build frontend"
            cd frontend
            npm ci
            npm run build
            cd ..

            echo "==> (4) Run database migrations"
            cd backend
            FLASK_ENV=production DATABASE_URL="${DATABASE_URL}" \
              flask db upgrade head
            cd ..

            echo "==> (5) Reload Gunicorn (zero-downtime)"
            sudo systemctl reload gunicorn

            echo "==> Deploy complete"
          ENDSSH

      - name: Post-deploy health check
        env:
          VPS_SUBDOMAIN: ${{ secrets.VPS_SUBDOMAIN }}
        run: |
          echo "Waiting for Gunicorn to finish graceful reload..."
          sleep 5
          for i in $(seq 1 10); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 10 \
              "https://${VPS_SUBDOMAIN}.duckdns.org/api/health" || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed."
              exit 0
            fi
            sleep 3
          done
          echo "Health check failed after 10 attempts."
          exit 1
