# .github/workflows/deploy.yml
name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  # Allow manual triggering from the GitHub Actions UI
  # Use this when the deploy workflow needs to be triggered manually,
  # e.g. after a workflow file change causes the automatic trigger to be skipped.
  workflow_dispatch:
    inputs:
      target_sha:
        description: 'SHA to deploy (leave blank to deploy HEAD of main)'
        required: false
        default: ''

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    # Prevent concurrent deploys — queue them instead of cancelling in-progress ones
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    # workflow_dispatch is an intentional emergency fallback for cases where the
    # automatic workflow_run trigger is skipped (e.g. when deploy.yml itself was
    # changed in the merged PR). Only repository collaborators with write access
    # can trigger workflow_dispatch via the GitHub Actions UI.
    if: >
      (github.event_name == 'workflow_dispatch') ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')

    steps:
      # ── Step 1: Validate all required secrets are set ─────────────────────
      - name: Validate secrets
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_HOST_KEY: ${{ secrets.VPS_HOST_KEY }}
          VPS_SUBDOMAIN: ${{ secrets.VPS_SUBDOMAIN }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          MISSING=""
          [ -z "$VPS_SSH_KEY" ]   && MISSING="$MISSING VPS_SSH_KEY"
          [ -z "$VPS_USER" ]      && MISSING="$MISSING VPS_USER"
          [ -z "$VPS_HOST" ]      && MISSING="$MISSING VPS_HOST"
          [ -z "$VPS_HOST_KEY" ]  && MISSING="$MISSING VPS_HOST_KEY"
          [ -z "$VPS_SUBDOMAIN" ] && MISSING="$MISSING VPS_SUBDOMAIN"
          [ -z "$DATABASE_URL" ]  && MISSING="$MISSING DATABASE_URL"
          if [ -n "$MISSING" ]; then
            echo "ERROR: The following required secrets are not set:$MISSING"
            echo "Go to Settings → Secrets and variables → Actions and add them."
            exit 1
          fi
          echo "All required secrets are set."

      # ── Step 2: Set up SSH key ─────────────────────────────────────────────
      - name: Set up SSH key
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$VPS_SSH_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          cat >> ~/.ssh/config <<'EOF'
          Host *
            IdentityFile ~/.ssh/id_deploy
            ServerAliveInterval 30
            ServerAliveCountMax 20
            TCPKeepAlive yes
          EOF
          chmod 600 ~/.ssh/config

      # ── Step 3: Add VPS to known hosts ────────────────────────────────────
      - name: Add VPS to known hosts
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_HOST_KEY }}" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      # ── Step 4: Verify SSH connectivity before deploying ──────────────────
      - name: Verify SSH connectivity
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          ssh -i ~/.ssh/id_deploy \
            -o ConnectTimeout=10 \
            $VPS_USER@$VPS_HOST \
            "echo 'SSH connection verified'" \
          || { echo "ERROR: Cannot connect to VPS at $VPS_HOST as $VPS_USER"; exit 1; }

      # ── Step 4b: Checkout repo (needed for readiness scripts + deploy) ───
      - name: Checkout repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          ref: ${{ inputs.target_sha || github.event.workflow_run.head_sha || 'main' }}
          persist-credentials: false

      - name: Resolve target SHA
        id: resolve_sha
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      # ── Step 4c: VPS readiness (+ optional root auto-migrate) ───────────
      - name: Ensure VPS readiness
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_ROOT_SSH_KEY: ${{ secrets.VPS_ROOT_SSH_KEY }}
          SSH_KEY_PATH: ~/.ssh/id_deploy
        run: |
          chmod +x scripts/ci-ensure-vps-readiness.sh scripts/run-vps-readiness-check.sh
          VPS_USER="$VPS_USER" VPS_HOST="$VPS_HOST" SSH_KEY_PATH="$SSH_KEY_PATH" \
            VPS_ROOT_SSH_KEY="$VPS_ROOT_SSH_KEY" \
            bash scripts/ci-ensure-vps-readiness.sh

      # ── Step 5: Build frontend on runner ────────────────────────────────
      - name: Build frontend on runner (avoids OOM on 2GB VPS)
        run: |
          cd frontend
          npm ci
          npm install --no-save @rollup/rollup-linux-x64-gnu
          npm run build
          echo "Frontend built successfully ($(du -sh dist | cut -f1) total)"

      - name: Deploy
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          TARGET_SHA: ${{ steps.resolve_sha.outputs.sha }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          B2_KEY_ID: ${{ secrets.B2_KEY_ID }}
          B2_APPLICATION_KEY: ${{ secrets.B2_APPLICATION_KEY }}
          B2_BUCKET_NAME: ${{ secrets.B2_BUCKET_NAME }}
        run: |
          # Copy deploy script and shared checks
          scp -i ~/.ssh/id_deploy scripts/deploy.sh $VPS_USER@$VPS_HOST:/home/deploy/deploy.sh
          scp -i ~/.ssh/id_deploy scripts/deploy-async-stack-checks.sh $VPS_USER@$VPS_HOST:/home/deploy/deploy-async-stack-checks.sh
          scp -i ~/.ssh/id_deploy scripts/run-vps-readiness-check.sh $VPS_USER@$VPS_HOST:/home/deploy/run-vps-readiness-check.sh
          # Copy backup scripts and library (idempotent — safe to overwrite on every deploy)
          scp -i ~/.ssh/id_deploy scripts/backup.sh $VPS_USER@$VPS_HOST:/home/deploy/backup.sh
          scp -i ~/.ssh/id_deploy scripts/restore.sh $VPS_USER@$VPS_HOST:/home/deploy/restore.sh
          scp -i ~/.ssh/id_deploy scripts/redis-backup.sh $VPS_USER@$VPS_HOST:/home/deploy/redis-backup.sh
          scp -i ~/.ssh/id_deploy scripts/wal-archive.sh $VPS_USER@$VPS_HOST:/home/deploy/wal-archive.sh
          scp -i ~/.ssh/id_deploy scripts/pg-basebackup.sh $VPS_USER@$VPS_HOST:/home/deploy/pg-basebackup.sh
          scp -i ~/.ssh/id_deploy scripts/daily-summary.sh $VPS_USER@$VPS_HOST:/home/deploy/daily-summary.sh
          scp -i ~/.ssh/id_deploy scripts/install-backup-cron.sh $VPS_USER@$VPS_HOST:/home/deploy/install-backup-cron.sh
          scp -i ~/.ssh/id_deploy scripts/verify-backup-health.sh $VPS_USER@$VPS_HOST:/home/deploy/verify-backup-health.sh
          scp -i ~/.ssh/id_deploy scripts/backup_health_check.py $VPS_USER@$VPS_HOST:/home/deploy/backup_health_check.py
          scp -i ~/.ssh/id_deploy scripts/setup-b2-rclone.py $VPS_USER@$VPS_HOST:/home/deploy/setup-b2-rclone.py
          scp -i ~/.ssh/id_deploy scripts/inject-remote-backup.py $VPS_USER@$VPS_HOST:/home/deploy/inject-remote-backup.py
          scp -i ~/.ssh/id_deploy scripts/restore-drill.sh $VPS_USER@$VPS_HOST:/home/deploy/restore-drill.sh
          scp -i ~/.ssh/id_deploy backup_lib.py $VPS_USER@$VPS_HOST:/home/deploy/backup_lib.py
          # Set correct permissions on backup scripts
          ssh -i ~/.ssh/id_deploy $VPS_USER@$VPS_HOST \
            "chmod 750 /home/deploy/backup.sh /home/deploy/restore.sh /home/deploy/redis-backup.sh /home/deploy/pg-basebackup.sh /home/deploy/daily-summary.sh /home/deploy/install-backup-cron.sh /home/deploy/verify-backup-health.sh /home/deploy/restore-drill.sh && chmod 755 /home/deploy/wal-archive.sh && chmod 644 /home/deploy/backup_lib.py /home/deploy/backup_health_check.py /home/deploy/setup-b2-rclone.py /home/deploy/inject-remote-backup.py"
          # Create a stub backup.conf if none exists so backup.sh can run without blocking the deploy.
          # The stub has empty remote/alert credentials — backup will skip remote transfer and alerting
          # but will still run pg_dump and write a local manifest entry.
          # Operators should replace this with a real backup.conf to enable full backup functionality.
          scp -i ~/.ssh/id_deploy scripts/setup-stub-conf.py $VPS_USER@$VPS_HOST:/tmp/setup-stub-conf.py
          ssh -i ~/.ssh/id_deploy $VPS_USER@$VPS_HOST "python3 /tmp/setup-stub-conf.py && rm /tmp/setup-stub-conf.py"
          # Inject VPS-specific PostgreSQL credentials into backup.conf from the DATABASE_URL secret.
          # DATABASE_URL is in the step env — base64-encode it from the env var (not a shell literal)
          # so passwords containing single quotes or special characters are handled safely.
          scp -i ~/.ssh/id_deploy scripts/inject-db-creds.py $VPS_USER@$VPS_HOST:/tmp/inject-db-creds.py
          DB_URL_B64=$(printf '%s' "$DATABASE_URL" | base64 -w0)
          ssh -i ~/.ssh/id_deploy $VPS_USER@$VPS_HOST "DATABASE_URL=\$(echo '$DB_URL_B64' | base64 -d) python3 /tmp/inject-db-creds.py && rm /tmp/inject-db-creds.py"
          # Optional: configure Backblaze B2 rclone remote and enable cloud backup when secrets are set.
          B2_APP_KEY_B64=$(printf '%s' "$B2_APPLICATION_KEY" | base64 -w0)
          ssh -i ~/.ssh/id_deploy $VPS_USER@$VPS_HOST \
            "B2_KEY_ID='$B2_KEY_ID' B2_APPLICATION_KEY=\$(echo '$B2_APP_KEY_B64' | base64 -d) python3 /home/deploy/setup-b2-rclone.py" \
            || { echo "ERROR: setup-b2-rclone.py failed."; exit 1; }
          ssh -i ~/.ssh/id_deploy $VPS_USER@$VPS_HOST \
            "B2_BUCKET_NAME='$B2_BUCKET_NAME' python3 /home/deploy/inject-remote-backup.py" \
            || { echo "ERROR: inject-remote-backup.py failed."; exit 1; }
          # Install backup cron entries (idempotent; preserves non-backup crontab lines).
          ssh -i ~/.ssh/id_deploy $VPS_USER@$VPS_HOST "bash /home/deploy/install-backup-cron.sh"
          # rclone is required for B2 off-site backup when REMOTE_METHOD is set.
          ssh -i ~/.ssh/id_deploy $VPS_USER@$VPS_HOST \
            "command -v rclone >/dev/null || sudo apt-get install -y rclone"
          # Pre-flight: verify backup.sh can connect to PostgreSQL before running the full deploy.
          # This catches DB connectivity issues (wrong user, missing .pgpass, etc.) before the deploy starts.
          ssh -i ~/.ssh/id_deploy $VPS_USER@$VPS_HOST "/home/deploy/backup.sh --check" \
            || { echo "ERROR: backup.sh --check failed — PostgreSQL connectivity issue. Check /home/deploy/logs/backup.log on VPS."; exit 1; }
          ssh -i ~/.ssh/id_deploy $VPS_USER@$VPS_HOST "rm -rf /home/deploy/frontend-dist"
          scp -i ~/.ssh/id_deploy -r frontend/dist $VPS_USER@$VPS_HOST:/home/deploy/frontend-dist
          # Run deploy script (keepalive in ~/.ssh/config; explicit opts on long session)
          ssh -i ~/.ssh/id_deploy \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=20 \
            -o TCPKeepAlive=yes \
            $VPS_USER@$VPS_HOST \
            "chmod +x /home/deploy/deploy.sh && bash /home/deploy/deploy.sh '$TARGET_SHA'"

      - name: Deploy failure diagnostics
        if: failure()
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          echo "=== Deploy failed — collecting VPS migration diagnostics ==="
          ssh -i ~/.ssh/id_deploy $VPS_USER@$VPS_HOST bash -s <<'REMOTE'
          set +e
          cd /home/deploy/app/backend || cd /home/deploy/app/backend 2>/dev/null
          if [ -f .env ]; then
            set -a
            # shellcheck source=/dev/null
            source .env
            set +a
          fi
          echo "--- Alembic revision ---"
          FLASK_ENV=production flask db current 2>&1 || true
          echo "--- Dedup preflight ---"
          python3.11 scripts/preflight_dedup_migration.py --json 2>&1 || true
          REMOTE

      # ── Step 6: Post-deploy health check + SHA verification ──────────────
      - name: Post-deploy health check
        env:
          VPS_SUBDOMAIN: ${{ secrets.VPS_SUBDOMAIN }}
          TARGET_SHA: ${{ steps.resolve_sha.outputs.sha }}
        run: |
          BASE_URL="https://${VPS_SUBDOMAIN}.duckdns.org"

          # Health check — poll from t=0 with no upfront sleep.
          # deploy.sh already verifies Gunicorn is healthy on localhost before
          # returning, so by the time we reach this step the server is up.
          # This loop is the public-facing (nginx) confirmation: 20 attempts,
          # worst case (20 × (--max-time 20 + sleep 5)) = ~500s total, which
          # is ample headroom for any nginx proxy lag or transient network blip.
          #
          # --connect-timeout 5  → fail fast when the port isn't open yet
          #                        (expected early in reload, retry quickly)
          # --max-time 20        → fail if connected but server hangs >20s
          #                        (this is the signal of a real problem)
          # Together these let curl distinguish "not ready yet" from "stuck".
          #
          # IMPORTANT: the `|| echo "000"` guard is required. GitHub Actions
          # runs each `run:` block under `set -e`. Without the guard, a non-zero
          # curl exit (e.g. exit 7 = connection refused, exit 28 = timeout) would
          # terminate the step immediately before the retry loop could continue.
          echo "Polling ${BASE_URL}/api/health (max 20 attempts, ~500s worst case)..."
          HEALTH_PASSED=0
          for i in $(seq 1 20); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              --connect-timeout 5 \
              --max-time 20 \
              "${BASE_URL}/api/health" 2>/dev/null || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed."
              HEALTH_PASSED=1
              break
            fi
            sleep 5
          done
          if [ "$HEALTH_PASSED" = "0" ]; then
            echo "Health check failed after 20 attempts."
            exit 1
          fi

          # SHA verification — confirm the deployed code matches the triggering commit
          DEPLOYED_SHA=$(curl -s --max-time 10 "${BASE_URL}/api/version" | python3 -c "import sys,json; print(json.load(sys.stdin).get('sha','unknown'))" 2>/dev/null || echo "unknown")
          echo "Expected SHA: $TARGET_SHA"
          echo "Deployed SHA: $DEPLOYED_SHA"
          if [ "$DEPLOYED_SHA" = "$TARGET_SHA" ]; then
            echo "SHA verification passed — correct version is running."
          else
            echo "ERROR: Deployed SHA ($DEPLOYED_SHA) does not match expected ($TARGET_SHA)."
            echo "The app is healthy but the wrong version is running. Failing the workflow."
            exit 1
          fi

      # ── Step 7: Post-deploy ownership smoke test ──────────────────────────
      # Catches the class of regression where scoping logic works for new data
      # but silently breaks for legacy data (owner_user_id=NULL). Logs in as a
      # real non-admin user and asserts that:
      #   a) A known sentinel lead with owner_user_id=NULL is directly fetchable
      #      via GET /api/properties/<id> (explicit NULL-owner visibility check)
      #   b) The sum of all queue counts is non-zero (broad sanity check)
      # Set SMOKE_TEST_SENTINEL_LEAD_ID to the database ID of a known unowned
      # lead (any lead imported before the ownership model) to enable check (a).
      - name: Post-deploy ownership smoke test
        env:
          VPS_SUBDOMAIN: ${{ secrets.VPS_SUBDOMAIN }}
          SMOKE_TEST_EMAIL: ${{ secrets.SMOKE_TEST_EMAIL }}
          SMOKE_TEST_PASSWORD: ${{ secrets.SMOKE_TEST_PASSWORD }}
          SMOKE_TEST_SENTINEL_LEAD_ID: ${{ secrets.SMOKE_TEST_SENTINEL_LEAD_ID }}
        run: |
          BASE_URL="https://${VPS_SUBDOMAIN}.duckdns.org"

          # Skip if smoke test credentials are not configured
          if [ -z "$SMOKE_TEST_EMAIL" ] || [ -z "$SMOKE_TEST_PASSWORD" ]; then
            echo "SMOKE_TEST_EMAIL or SMOKE_TEST_PASSWORD not set — skipping ownership smoke test."
            echo "Add SMOKE_TEST_EMAIL and SMOKE_TEST_PASSWORD secrets to enable this check."
            exit 0
          fi

          echo "Logging in as smoke test user ($SMOKE_TEST_EMAIL)..."
          # Build JSON payload safely using Python to handle special characters in secrets
          LOGIN_PAYLOAD=$(python3 -c "import json, os; print(json.dumps({'email': os.environ['SMOKE_TEST_EMAIL'], 'password': os.environ['SMOKE_TEST_PASSWORD']}))")
          LOGIN_RESPONSE=$(curl -s --max-time 15 \
            -X POST "${BASE_URL}/api/auth/login" \
            -H "Content-Type: application/json" \
            -d "$LOGIN_PAYLOAD")

          TOKEN=$(echo "$LOGIN_RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin).get('token',''))" 2>/dev/null || echo "")
          if [ -z "$TOKEN" ]; then
            echo "ERROR: Could not obtain auth token. Login response: $LOGIN_RESPONSE"
            exit 1
          fi
          echo "Login successful."

          # Check (a): Sentinel lead with owner_user_id=NULL must be directly visible.
          # This is the explicit NULL-owner regression check — TOTAL=0 would also catch
          # a full regression, but this catches partial regressions where a user has some
          # owned leads (masking the bug) but can't see the unowned legacy data.
          if [ -n "$SMOKE_TEST_SENTINEL_LEAD_ID" ]; then
            echo "Checking sentinel lead ID=$SMOKE_TEST_SENTINEL_LEAD_ID (expected owner_user_id=NULL)..."
            SENTINEL_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 \
              "${BASE_URL}/api/properties/${SMOKE_TEST_SENTINEL_LEAD_ID}" \
              -H "Authorization: Bearer $TOKEN")
            echo "Sentinel lead HTTP status: $SENTINEL_STATUS"
            if [ "$SENTINEL_STATUS" != "200" ]; then
              echo "ERROR: Sentinel lead $SMOKE_TEST_SENTINEL_LEAD_ID returned $SENTINEL_STATUS."
              echo "This indicates an ownership scoping regression — leads with owner_user_id=NULL"
              echo "are not visible to non-admin users. Review recent changes to ownership filters."
              exit 1
            fi
            echo "Sentinel lead check passed — unowned lead is visible."
          else
            echo "SMOKE_TEST_SENTINEL_LEAD_ID not set — skipping sentinel lead check."
            echo "Add SMOKE_TEST_SENTINEL_LEAD_ID secret (any lead ID with owner_user_id=NULL)"
            echo "to enable the explicit NULL-owner visibility check."
          fi

          # Check (b): Sum of all queue counts must be non-zero.
          COUNTS=$(curl -s --max-time 15 \
            "${BASE_URL}/api/queues/counts" \
            -H "Authorization: Bearer $TOKEN")

          echo "Queue counts response: $COUNTS"

          TOTAL=$(echo "$COUNTS" | python3 -c "import sys, json; d=json.load(sys.stdin); print(sum(d.get(k,0) for k in ['todays_action','previously_warm','follow_up_overdue','no_next_action','needs_review','do_not_contact','missing_property_match']))" 2>/dev/null || echo "0")

          echo "Sum of all queue counts: $TOTAL"
          if [ "$TOTAL" = "0" ]; then
            echo "ERROR: All queue counts are zero for $SMOKE_TEST_EMAIL after deploy."
            echo "This indicates an ownership scoping regression — leads with owner_user_id=NULL"
            echo "are not visible to non-admin users. Review recent changes to ownership filters."
            exit 1
          fi
          echo "Ownership smoke test passed — queues are non-empty for $SMOKE_TEST_EMAIL."

      # ── Step 8: Post-deploy search smoke test ─────────────────────────────
      # Verifies that GET /api/search returns HTTP 200 after deploy.
      # Catches the class of regression where a SQL syntax error in the ILIKE
      # query path causes every search to 500 (e.g. duplicate ELSE in CASE).
      # Skipped if smoke test credentials are not configured.
      - name: Post-deploy search smoke test
        env:
          VPS_SUBDOMAIN: ${{ secrets.VPS_SUBDOMAIN }}
          SMOKE_TEST_EMAIL: ${{ secrets.SMOKE_TEST_EMAIL }}
          SMOKE_TEST_PASSWORD: ${{ secrets.SMOKE_TEST_PASSWORD }}
        run: |
          BASE_URL="https://${VPS_SUBDOMAIN}.duckdns.org"

          if [ -z "$SMOKE_TEST_EMAIL" ] || [ -z "$SMOKE_TEST_PASSWORD" ]; then
            echo "SMOKE_TEST_EMAIL or SMOKE_TEST_PASSWORD not set — skipping search smoke test."
            exit 0
          fi

          echo "Logging in for search smoke test..."
          LOGIN_PAYLOAD=$(python3 -c "import json, os; print(json.dumps({'email': os.environ['SMOKE_TEST_EMAIL'], 'password': os.environ['SMOKE_TEST_PASSWORD']}))")
          LOGIN_RESPONSE=$(curl -s --max-time 15 \
            -X POST "${BASE_URL}/api/auth/login" \
            -H "Content-Type: application/json" \
            -d "$LOGIN_PAYLOAD")

          TOKEN=$(echo "$LOGIN_RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin).get('token',''))" 2>/dev/null || echo "")
          if [ -z "$TOKEN" ]; then
            echo "ERROR: Could not obtain auth token for search smoke test. Response: $LOGIN_RESPONSE"
            exit 1
          fi

          echo "Running search smoke test (GET /api/search?q=test)..."
          SEARCH_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 \
            "${BASE_URL}/api/search?q=test" \
            -H "Authorization: Bearer $TOKEN")

          echo "Search endpoint HTTP status: $SEARCH_STATUS"
          if [ "$SEARCH_STATUS" != "200" ]; then
            echo "ERROR: Search endpoint returned $SEARCH_STATUS — expected 200."
            echo "This indicates a SQL syntax error or unhandled exception in /api/search."
            echo "Check the Flask logs on the VPS for the full traceback."
            exit 1
          fi
          echo "Search smoke test passed."
