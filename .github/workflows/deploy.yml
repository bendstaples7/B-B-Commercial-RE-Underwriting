# .github/workflows/deploy.yml
name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  # Allow manual triggering from the GitHub Actions UI
  # Use this when the deploy workflow needs to be triggered manually,
  # e.g. after a workflow file change causes the automatic trigger to be skipped.
  workflow_dispatch:
    inputs:
      target_sha:
        description: 'SHA to deploy (leave blank to deploy HEAD of main)'
        required: false
        default: ''

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    # Prevent concurrent deploys — queue them instead of cancelling in-progress ones
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    # workflow_dispatch is an intentional emergency fallback for cases where the
    # automatic workflow_run trigger is skipped (e.g. when deploy.yml itself was
    # changed in the merged PR). Only repository collaborators with write access
    # can trigger workflow_dispatch via the GitHub Actions UI.
    if: >
      (github.event_name == 'workflow_dispatch') ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')

    steps:
      # ── Step 1: Validate all required secrets are set ─────────────────────
      - name: Validate secrets
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_HOST_KEY: ${{ secrets.VPS_HOST_KEY }}
          VPS_SUBDOMAIN: ${{ secrets.VPS_SUBDOMAIN }}
        run: |
          MISSING=""
          [ -z "$VPS_SSH_KEY" ]   && MISSING="$MISSING VPS_SSH_KEY"
          [ -z "$VPS_USER" ]      && MISSING="$MISSING VPS_USER"
          [ -z "$VPS_HOST" ]      && MISSING="$MISSING VPS_HOST"
          [ -z "$VPS_HOST_KEY" ]  && MISSING="$MISSING VPS_HOST_KEY"
          [ -z "$VPS_SUBDOMAIN" ] && MISSING="$MISSING VPS_SUBDOMAIN"
          if [ -n "$MISSING" ]; then
            echo "ERROR: The following required secrets are not set:$MISSING"
            echo "Go to Settings → Secrets and variables → Actions and add them."
            exit 1
          fi
          echo "All required secrets are set."

      # ── Step 2: Set up SSH key ─────────────────────────────────────────────
      - name: Set up SSH key
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$VPS_SSH_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy

      # ── Step 3: Add VPS to known hosts ────────────────────────────────────
      - name: Add VPS to known hosts
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_HOST_KEY }}" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      # ── Step 4: Verify SSH connectivity before deploying ──────────────────
      - name: Verify SSH connectivity
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          ssh -i ~/.ssh/id_deploy \
            -o ConnectTimeout=10 \
            $VPS_USER@$VPS_HOST \
            "echo 'SSH connection verified'" \
          || { echo "ERROR: Cannot connect to VPS at $VPS_HOST as $VPS_USER"; exit 1; }

      # ── Step 4b: Verify VPS readiness — required files exist ─────────────
      - name: Verify VPS readiness
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          ssh -i ~/.ssh/id_deploy $VPS_USER@$VPS_HOST bash << 'READINESS'
          MISSING=""
          [ -d /home/deploy/app ]              || MISSING="$MISSING /home/deploy/app (app directory)"
          [ -f /home/deploy/app/backend/.env ] || MISSING="$MISSING /home/deploy/app/backend/.env"
          [ -d /home/deploy/app/frontend ]     || MISSING="$MISSING /home/deploy/app/frontend"
          # Verify the app directory is an initialized git repository
          git -C /home/deploy/app rev-parse --git-dir > /dev/null 2>&1 \
            || MISSING="$MISSING /home/deploy/app/.git (not a git repo — run vps-setup clone step)"
          # Verify backup.conf exists — backup.sh will fail without it.
          # Note: the Deploy step will auto-create a stub if missing, so this
          # is a warning rather than a hard failure.
          if [ ! -f /home/deploy/backup.conf ]; then
            echo "NOTE: /home/deploy/backup.conf not found — Deploy step will create a stub automatically."
          fi
          if [ -n "$MISSING" ]; then
            echo "ERROR: Required VPS files/directories missing:$MISSING"
            echo "The VPS may not be fully provisioned. Run the vps-setup scripts first."
            exit 1
          fi
          # deploy.sh is copied by this workflow — warn if absent (first deploy after provisioning)
          if [ ! -f /home/deploy/deploy.sh ]; then
            echo "NOTE: /home/deploy/deploy.sh not yet present — will be copied in the Deploy step."
          fi
          echo "VPS readiness check passed."
          READINESS

      # ── Step 5: Checkout repo, build frontend on runner, deploy ──────────
      - name: Checkout repo (to get deploy script and build frontend)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          ref: ${{ inputs.target_sha || github.event.workflow_run.head_sha || 'main' }}
          persist-credentials: false

      # Resolve the actual commit SHA after checkout so TARGET_SHA is always a
      # full commit hash — never a branch name like 'main'. This matters for the
      # post-deploy SHA verification step which compares against the deployed app's
      # reported SHA.
      - name: Resolve target SHA
        id: resolve_sha
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build frontend on runner (avoids OOM on 2GB VPS)
        run: |
          cd frontend
          npm ci
          npm install --no-save @rollup/rollup-linux-x64-gnu
          npm run build
          echo "Frontend built successfully ($(du -sh dist | cut -f1) total)"

      - name: Deploy
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          TARGET_SHA: ${{ steps.resolve_sha.outputs.sha }}
        run: |
          # Copy deploy script
          scp -i ~/.ssh/id_deploy scripts/deploy.sh $VPS_USER@$VPS_HOST:/home/deploy/deploy.sh
          # Copy backup scripts and library (idempotent — safe to overwrite on every deploy)
          scp -i ~/.ssh/id_deploy scripts/backup.sh $VPS_USER@$VPS_HOST:/home/deploy/backup.sh
          scp -i ~/.ssh/id_deploy scripts/restore.sh $VPS_USER@$VPS_HOST:/home/deploy/restore.sh
          scp -i ~/.ssh/id_deploy scripts/redis-backup.sh $VPS_USER@$VPS_HOST:/home/deploy/redis-backup.sh
          scp -i ~/.ssh/id_deploy scripts/wal-archive.sh $VPS_USER@$VPS_HOST:/home/deploy/wal-archive.sh
          scp -i ~/.ssh/id_deploy scripts/pg-basebackup.sh $VPS_USER@$VPS_HOST:/home/deploy/pg-basebackup.sh
          scp -i ~/.ssh/id_deploy scripts/daily-summary.sh $VPS_USER@$VPS_HOST:/home/deploy/daily-summary.sh
          scp -i ~/.ssh/id_deploy backup_lib.py $VPS_USER@$VPS_HOST:/home/deploy/backup_lib.py
          # Set correct permissions on backup scripts
          ssh -i ~/.ssh/id_deploy $VPS_USER@$VPS_HOST \
            "chmod 750 /home/deploy/backup.sh /home/deploy/restore.sh /home/deploy/redis-backup.sh /home/deploy/pg-basebackup.sh /home/deploy/daily-summary.sh && chmod 755 /home/deploy/wal-archive.sh && chmod 644 /home/deploy/backup_lib.py"
          # Create a stub backup.conf if none exists so backup.sh can run without blocking the deploy.
          # The stub has empty remote/alert credentials — backup will skip remote transfer and alerting
          # but will still run pg_dump and write a local manifest entry.
          # Operators should replace this with a real backup.conf to enable full backup functionality.
          scp -i ~/.ssh/id_deploy scripts/setup-stub-conf.py $VPS_USER@$VPS_HOST:/tmp/setup-stub-conf.py
          ssh -i ~/.ssh/id_deploy $VPS_USER@$VPS_HOST "python3 /tmp/setup-stub-conf.py && rm /tmp/setup-stub-conf.py"
          # Remove any stale frontend-dist from previous runs, then copy fresh build
          ssh -i ~/.ssh/id_deploy $VPS_USER@$VPS_HOST "rm -rf /home/deploy/frontend-dist"
          scp -i ~/.ssh/id_deploy -r frontend/dist $VPS_USER@$VPS_HOST:/home/deploy/frontend-dist
          # Run deploy script
          ssh -i ~/.ssh/id_deploy $VPS_USER@$VPS_HOST \
            "chmod +x /home/deploy/deploy.sh && bash /home/deploy/deploy.sh '$TARGET_SHA'"

      # ── Step 6: Post-deploy health check + SHA verification ──────────────
      - name: Post-deploy health check
        env:
          VPS_SUBDOMAIN: ${{ secrets.VPS_SUBDOMAIN }}
          TARGET_SHA: ${{ steps.resolve_sha.outputs.sha }}
        run: |
          echo "Waiting for Gunicorn to finish graceful reload..."
          sleep 5
          BASE_URL="https://${VPS_SUBDOMAIN}.duckdns.org"

          # Health check
          for i in $(seq 1 10); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 10 \
              "${BASE_URL}/api/health")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed."
              break
            fi
            if [ "$i" = "10" ]; then
              echo "Health check failed after 10 attempts."
              exit 1
            fi
            sleep 3
          done

          # SHA verification — confirm the deployed code matches the triggering commit
          DEPLOYED_SHA=$(curl -s --max-time 10 "${BASE_URL}/api/version" | python3 -c "import sys,json; print(json.load(sys.stdin).get('sha','unknown'))" 2>/dev/null || echo "unknown")
          echo "Expected SHA: $TARGET_SHA"
          echo "Deployed SHA: $DEPLOYED_SHA"
          if [ "$DEPLOYED_SHA" = "$TARGET_SHA" ]; then
            echo "SHA verification passed — correct version is running."
          else
            echo "ERROR: Deployed SHA ($DEPLOYED_SHA) does not match expected ($TARGET_SHA)."
            echo "The app is healthy but the wrong version is running. Failing the workflow."
            exit 1
          fi
