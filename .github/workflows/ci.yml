name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  frontend:
    name: Frontend — typecheck, build, tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Install optional native dependencies (Linux CI fix)
        # package-lock.json was generated on Windows and omits Linux-specific
        # optional packages. Explicitly install the rollup Linux native binary
        # so vitest and vite build work on ubuntu-latest runners.
        run: npm install --no-save @rollup/rollup-linux-x64-gnu
        working-directory: frontend

      - name: TypeScript type-check
        run: npx tsc --noEmit
        working-directory: frontend

      - name: Run tests (includes App shell smoke test)
        run: npm test
        working-directory: frontend

      - name: Production build
        run: npm run build
        working-directory: frontend

  validate-workflows:
    name: Validate workflow YAML syntax
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate deploy.yml YAML syntax
        # Catches broken YAML in deploy.yml before it reaches main.
        # A malformed deploy.yml causes GitHub to silently ignore workflow_dispatch
        # and skip automatic deploys — this check prevents that from happening.
        # Runs as a separate job so it always executes regardless of frontend failures.
        run: |
          pip install pyyaml -q
          python3 -c "import yaml; yaml.safe_load(open('.github/workflows/deploy.yml')); print('deploy.yml YAML valid')"

  vps-smoke-test:
    name: VPS smoke test — backup connectivity
    runs-on: ubuntu-latest
    # Only run on pushes to main (PRs don't have VPS secrets)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: none

    steps:
      - name: Set up SSH key
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$VPS_SSH_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy

      - name: Add VPS to known hosts
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_HOST_KEY }}" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Run backup.sh --check on VPS
        # Verifies that backup.sh can connect to PostgreSQL on the VPS.
        # Catches DB connectivity issues (wrong PGUSER, missing .pgpass, etc.)
        # before they block a deploy. Runs after every push to main so regressions
        # are caught immediately rather than at deploy time.
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          ssh -i ~/.ssh/id_deploy \
            -o ConnectTimeout=10 \
            $VPS_USER@$VPS_HOST \
            "/home/deploy/backup.sh --check" \
          || {
            echo "ERROR: backup.sh --check failed on VPS."
            echo "This means the backup system cannot connect to PostgreSQL."
            echo "Check /home/deploy/logs/backup.log on the VPS for details."
            exit 1
          }

      - name: Verify Nginx serves frontend (catches permission denied on /home/deploy)
        # The previous smoke test only checks the API via Gunicorn on port 5000,
        # which bypasses Nginx entirely. This check hits the public HTTPS URL and
        # verifies Nginx can actually serve index.html from frontend/dist.
        #
        # Root cause this catches: Ubuntu sets home dirs to 750 by default.
        # Nginx runs as www-data which has no group membership in deploy, so it
        # cannot traverse /home/deploy to reach frontend/dist. The symptom is a
        # 500 "Permission denied" on stat() of index.html — invisible to the API
        # health check but immediately fatal to any browser request.
        env:
          VPS_SUBDOMAIN: ${{ secrets.VPS_SUBDOMAIN }}
        run: |
          BASE_URL="https://${VPS_SUBDOMAIN}.duckdns.org"
          echo "Checking Nginx frontend serve: GET ${BASE_URL}/"
          HTTP_STATUS=$(curl -s -o /tmp/frontend_response.html -w "%{http_code}" \
            --max-time 15 "${BASE_URL}/")
          echo "HTTP status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "ERROR: Expected HTTP 200 from ${BASE_URL}/ but got $HTTP_STATUS"
            echo "This usually means Nginx cannot read frontend/dist — check /home/deploy permissions (must be 751, not 750)."
            echo "Fix: ssh deploy@VPS 'chmod o+x /home/deploy'"
            exit 1
          fi
          # Verify the response is actually HTML (not an Nginx error page)
          if ! grep -q "<!DOCTYPE html>" /tmp/frontend_response.html 2>/dev/null; then
            echo "ERROR: Response from ${BASE_URL}/ does not contain <!DOCTYPE html>"
            echo "Nginx may be returning an error page instead of index.html."
            head -5 /tmp/frontend_response.html
            exit 1
          fi
          echo "Nginx frontend serve: OK (HTTP 200, HTML content confirmed)"

  backend:
    name: Backend — pytest
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt
        working-directory: backend

      - name: Verify Celery worker imports cleanly
        # Imports celery_worker which transitively loads every service, task,
        # and model. A broken import (wrong exception name, missing module,
        # circular dependency) crashes the worker on startup — this catches it
        # before it can reach production and before pytest even runs.
        run: python -c "import celery_worker; print('celery_worker imports OK')"
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          FLASK_ENV: testing
          SECRET_KEY: ci-test-secret-key
          JWT_SECRET_KEY: ci-test-jwt-secret
          CELERY_BROKER_URL: redis://localhost:6379/0
          REDIS_URL: redis://localhost:6379/0

      - name: Run tests
        run: pytest
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          FLASK_ENV: testing
          SECRET_KEY: ci-test-secret-key
          JWT_SECRET_KEY: ci-test-jwt-secret
