name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
      migrations: ${{ steps.filter.outputs.migrations }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Classify changed paths
        id: filter
        run: |
          set -euo pipefail
          FULL_REBUILD=false

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            if [ -z "$BASE" ]; then
              echo "::error::pull_request.base.sha is empty — cannot classify changes"
              exit 1
            fi
            if ! git cat-file -e "${BASE}^{commit}" 2>/dev/null; then
              echo "::error::Base commit $BASE is not available in this clone"
              exit 1
            fi
          else
            BASE="${{ github.event.before }}"
            # New branch / force-push / missing before SHA — full rebuild (do not
            # diff against repo root; that mis-classifies and can under-test).
            if [ -z "$BASE" ] || [[ "$BASE" =~ ^0+$ ]]; then
              echo "Push before SHA missing or zero — forcing full rebuild"
              FULL_REBUILD=true
            elif ! git cat-file -e "${BASE}^{commit}" 2>/dev/null; then
              echo "Push before SHA $BASE not in clone — forcing full rebuild"
              FULL_REBUILD=true
            fi
          fi

          if [ "$FULL_REBUILD" = "true" ]; then
            frontend=true
            backend=true
            migrations=true
            echo "Changed files: (full rebuild — before SHA unresolvable)"
          else
            # Fail loud on diff errors; empty output means no files changed.
            FILES="$(git diff --name-only "$BASE" HEAD)"
            echo "Changed files vs $BASE:"
            echo "$FILES"

            frontend=false
            backend=false
            migrations=false

            while IFS= read -r path; do
              [ -z "$path" ] && continue
              case "$path" in
                frontend/*|.github/workflows/ci.yml)
                  frontend=true
                  ;;
              esac
              case "$path" in
                backend/*|scripts/check_duplication.py|scripts/map_changed_to_tests.py|.githooks/*|dev.py|.github/workflows/ci.yml)
                  backend=true
                  ;;
              esac
              case "$path" in
                backend/alembic_migrations/*|backend/migrations/*|backend/app/models/*|backend/scripts/lint_migrations.py|backend/scripts/check_migration_chain.py|backend/scripts/check_model_schema.py|backend/scripts/check_enum_drift.py|backend/scripts/ci_test_dedup_migration_gate.py)
                  migrations=true
                  ;;
              esac
            done <<< "$FILES"
          fi

          # Push to main always builds frontend so Deploy can download frontend-dist.
          if [ "${{ github.event_name }}" = "push" ]; then
            frontend=true
          fi

          echo "frontend=$frontend" >> "$GITHUB_OUTPUT"
          echo "backend=$backend" >> "$GITHUB_OUTPUT"
          echo "migrations=$migrations" >> "$GITHUB_OUTPUT"
          echo "Outputs: frontend=$frontend backend=$backend migrations=$migrations"

  frontend:
    name: Frontend — typecheck, build, tests
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        # Retry up to 3 times — transient npm registry network errors (ECONNRESET,
        # ETIMEDOUT) occasionally hit GitHub-hosted runners mid-download.
        run: npm ci || npm ci || npm ci
        working-directory: frontend

      - name: Install optional native dependencies (Linux CI fix)
        # package-lock.json was generated on Windows and omits Linux-specific
        # optional packages. Explicitly install the rollup Linux native binary
        # so vitest and vite build work on ubuntu-latest runners.
        run: npm install --no-save @rollup/rollup-linux-x64-gnu
        working-directory: frontend

      - name: TypeScript type-check
        run: npx tsc --noEmit
        working-directory: frontend

      - name: Queue-advance timeline bleed regression (required gate)
        # Dedicated gate so cross-lead Activity contamination cannot slip past
        # a broad green suite. Companion structural checks live in
        # scripts/check_duplication.py (remount key + test presence).
        run: |
          npx vitest run src/utils/leadScopedRows.test.ts
          npx vitest run src/components/UnifiedLeadCommandCenter.test.tsx --testNamePattern='timeline does not bleed across leads'
          npx vitest run src/components/LeadTimeline.test.tsx --testNamePattern='fail-closed lead scope'
        working-directory: frontend

      - name: Run tests (includes App shell smoke test)
        run: npm test
        working-directory: frontend

      - name: Production build
        run: npm run build
        working-directory: frontend

      - name: Upload frontend dist for deploy
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 1
          if-no-files-found: error

  validate-workflows:
    name: Validate workflow YAML syntax
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate deploy.yml YAML syntax
        run: |
          pip install pyyaml -q
          python3 -c "import yaml; yaml.safe_load(open('.github/workflows/deploy.yml')); print('deploy.yml YAML valid')"

  deploy-contract:
    name: Deploy contract — sudoers and script sync
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate deploy/sudoers contract
        run: python scripts/validate_deploy_contract.py

  duplication-check:
    name: Structural duplication guard
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Check for parallel implementations and incomplete migrations
        run: python scripts/check_duplication.py

  vps-readiness:
    name: VPS readiness — deploy infra PRs
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect deploy infra changes
        id: changes
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          if git diff --name-only "${BASE}" HEAD | grep -qE \
            '^(scripts/deploy|scripts/run-vps-readiness|scripts/ci-ensure|scripts/deploy-async-stack|scripts/vps-setup/|\.github/workflows/deploy\.yml)'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip — no deploy infra changes
        if: steps.changes.outputs.changed != 'true'
        run: echo "No deploy infra files changed — skipping VPS readiness."

      - name: Set up SSH key
        if: steps.changes.outputs.changed == 'true'
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$VPS_SSH_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy

      - name: Add VPS to known hosts
        if: steps.changes.outputs.changed == 'true'
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_HOST_KEY }}" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Verify VPS readiness (no auto-migrate on PRs)
        if: steps.changes.outputs.changed == 'true'
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          SSH_KEY_PATH: ~/.ssh/id_deploy
        run: |
          chmod +x scripts/run-vps-readiness-check.sh scripts/deploy-async-stack-checks.sh
          scp -i ~/.ssh/id_deploy scripts/run-vps-readiness-check.sh \
            scripts/deploy-async-stack-checks.sh \
            "$VPS_USER@$VPS_HOST:/home/deploy/"
          ssh -i ~/.ssh/id_deploy -o ConnectTimeout=10 "$VPS_USER@$VPS_HOST" \
            "bash /home/deploy/run-vps-readiness-check.sh" \
          || {
            echo "ERROR: Production VPS is not ready for this deploy-infra change."
            echo "Run on VPS as root: sudo bash /home/deploy/app/scripts/vps-setup/migrate-async-stack.sh"
            echo "Or merge after VPS_ROOT_SSH_KEY auto-migrate is configured for deploy workflow."
            exit 1
          }

  vps-smoke-test:
    name: VPS smoke test — backup and readiness
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH key
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$VPS_SSH_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy

      - name: Add VPS to known hosts
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_HOST_KEY }}" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Run backup.sh --check on VPS
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          ssh -i ~/.ssh/id_deploy \
            -o ConnectTimeout=10 \
            $VPS_USER@$VPS_HOST \
            "/home/deploy/backup.sh --check" \
          || {
            echo "ERROR: backup.sh --check failed on VPS."
            exit 1
          }

      - name: Run backup health verification on VPS
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          ssh -i ~/.ssh/id_deploy \
            -o ConnectTimeout=10 \
            $VPS_USER@$VPS_HOST \
            "/home/deploy/verify-backup-health.sh" \
          || {
            echo "ERROR: verify-backup-health.sh failed on VPS."
            exit 1
          }

      # Soft only for async-stack ensure (exit 2). Hard failures (SSH, sudo, missing
      # files) still fail this job. Deploy re-ensures without SOFT_ASYNC_ENSURE_FAILURE.
      - name: Run VPS readiness check
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_ROOT_SSH_KEY: ${{ secrets.VPS_ROOT_SSH_KEY }}
          SSH_KEY_PATH: ~/.ssh/id_deploy
          SOFT_ASYNC_ENSURE_FAILURE: "1"
        run: |
          chmod +x scripts/ci-ensure-vps-readiness.sh scripts/run-vps-readiness-check.sh
          VPS_USER="$VPS_USER" VPS_HOST="$VPS_HOST" SSH_KEY_PATH="$SSH_KEY_PATH" \
            VPS_ROOT_SSH_KEY="$VPS_ROOT_SSH_KEY" \
            SOFT_ASYNC_ENSURE_FAILURE=1 \
            bash scripts/ci-ensure-vps-readiness.sh

  backend:
    name: Backend — pytest
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt
        working-directory: backend

      - name: Verify Celery worker imports cleanly
        # Imports celery_worker which transitively loads every service, task,
        # and model. A broken import (wrong exception name, missing module,
        # circular dependency) crashes the worker on startup — this catches it
        # before it can reach production and before pytest even runs.
        run: python -c "import celery_worker; print('celery_worker imports OK')"
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          FLASK_ENV: testing
          SECRET_KEY: ci-test-secret-key
          JWT_SECRET_KEY: ci-test-jwt-secret
          CELERY_BROKER_URL: redis://localhost:6379/0
          REDIS_URL: redis://localhost:6379/0

      - name: Run tests
        run: pytest -n auto -m "not performance"
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          FLASK_ENV: testing
          SECRET_KEY: ci-test-secret-key
          JWT_SECRET_KEY: ci-test-jwt-secret

  migrations:
    name: Backend — migration validation
    needs: changes
    if: needs.changes.outputs.migrations == 'true'
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt
        working-directory: backend

      - name: Lint migration files for dangerous patterns
        # Static analysis — no database needed.
        # Catches patterns that cause production crashes but are invisible in
        # SQLite-based tests: raw_conn.execute(), bind.connection used without
        # unwrapping the pool proxy, etc.
        run: python scripts/lint_migrations.py
        working-directory: backend

      - name: Create isolated migration test database
        # Create a second PostgreSQL database that pytest never touches.
        # The smoke-test runs flask db upgrade against this clean database so
        # that Alembic revision state from pytest's auto-migrate never
        # interferes with the migration chain validation.
        run: PGPASSWORD=postgres psql -h localhost -U postgres -c "CREATE DATABASE migration_test_db;"

      - name: Create dedup migration gate test database
        run: PGPASSWORD=postgres psql -h localhost -U postgres -c "CREATE DATABASE migration_dedup_test_db;"

      - name: Validate migration chain (head + root count gate)
        # Runs before any schema change — fails fast if head_count != 1 or root_count != 1.
        # Reports the detected counts and each offending revision identifier so the
        # developer knows exactly which revision broke the chain.
        run: python scripts/check_migration_chain.py
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/migration_test_db
          FLASK_ENV: testing
          SECRET_KEY: ci-test-secret-key
          JWT_SECRET_KEY: ci-test-jwt-secret
          FLASK_APP: app
          REDIS_URL: redis://localhost:6379/0
          CELERY_BROKER_URL: redis://localhost:6379/0
          KIRO_MIGRATION: "1"

      - name: Migration validation — fresh-DB upgrade (PostgreSQL 15, 300s timeout)
        # Migration validation job: runs flask db upgrade against a completely fresh
        # migration_test_db on PostgreSQL 15 (matching production) with a hard 300-second
        # timeout. KIRO_MIGRATION=1 prevents the app factory's auto-upgrade from firing.
        # On any non-zero exit the run fails and the error output is surfaced so the
        # failing revision is visible. No SQLite substitution — PostgreSQL only.
        run: |
          echo "=== Running flask db upgrade (timeout 300s) ==="
          set +e
          timeout 300 flask db upgrade 2>&1 | tee /tmp/migration_output.txt
          EXIT_CODE=${PIPESTATUS[0]}
          set -e
          if [ $EXIT_CODE -ne 0 ]; then
            echo "::error::flask db upgrade failed (exit $EXIT_CODE). Migration output:"
            cat /tmp/migration_output.txt
            exit $EXIT_CODE
          fi
          echo "=== Initial upgrade complete ==="
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/migration_test_db
          FLASK_ENV: testing
          SECRET_KEY: ci-test-secret-key
          JWT_SECRET_KEY: ci-test-jwt-secret
          FLASK_APP: app
          REDIS_URL: redis://localhost:6379/0
          CELERY_BROKER_URL: redis://localhost:6379/0
          KIRO_MIGRATION: "1"

      - name: Schema drift gate — ORM tables and columns
        run: python scripts/check_model_schema.py
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/migration_test_db
          FLASK_ENV: testing
          SECRET_KEY: ci-test-secret-key
          JWT_SECRET_KEY: ci-test-jwt-secret
          FLASK_APP: app
          REDIS_URL: redis://localhost:6379/0
          CELERY_BROKER_URL: redis://localhost:6379/0
          KIRO_MIGRATION: "1"

      - name: Fresh PostgreSQL runtime smoke — multifamily deals
        run: pytest -q tests/test_fresh_postgres_runtime_contract.py
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/migration_test_db
          MIGRATION_TEST_DB_URL: postgresql://postgres:postgres@localhost:5432/migration_test_db
          FLASK_ENV: testing
          SECRET_KEY: ci-test-secret-key
          JWT_SECRET_KEY: ci-test-jwt-secret
          REDIS_URL: redis://localhost:6379/0
          CELERY_BROKER_URL: redis://localhost:6379/0
          KIRO_MIGRATION: "1"

      - name: Dedup migration gate regression (f9 blocked without merge)
        # Production deploy failed when f9 ran against legacy duplicate clusters.
        # CI fresh-DB upgrades never hit this — seed dupes at f8, assert f9 fails,
        # merge, then assert f9 succeeds.
        run: python scripts/ci_test_dedup_migration_gate.py
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/migration_dedup_test_db
          FLASK_ENV: testing
          SECRET_KEY: ci-test-secret-key
          JWT_SECRET_KEY: ci-test-jwt-secret
          FLASK_APP: app
          REDIS_URL: redis://localhost:6379/0
          CELERY_BROKER_URL: redis://localhost:6379/0
          KIRO_MIGRATION: "1"

      - name: Migration idempotency + chain re-validation
        # Production never downgrades to base, and the historical pre-consolidation
        # migrations were authored against SQLite/incremental dev state — their
        # downgrade() paths (reverse enum/type casts, batch_alter_table drops) are
        # not reliably runnable to base on a fresh chain.  Instead of a
        # downgrade-to-base round-trip, we validate the two production-relevant
        # reversibility properties: (1) re-running `flask db upgrade` at head is a
        # clean no-op (idempotency — Req 2.6, 8.7), and (2) the chain still
        # resolves to exactly one root + one head afterwards.
        run: |
          echo "=== Idempotent re-run (upgrade again, must be a no-op) ==="
          timeout 300 flask db upgrade 2>&1
          echo "=== Re-validate chain head/root ==="
          python scripts/check_migration_chain.py
          echo "=== Idempotency check complete ==="
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/migration_test_db
          FLASK_ENV: testing
          SECRET_KEY: ci-test-secret-key
          JWT_SECRET_KEY: ci-test-jwt-secret
          FLASK_APP: app
          REDIS_URL: redis://localhost:6379/0
          CELERY_BROKER_URL: redis://localhost:6379/0
          KIRO_MIGRATION: "1"

      - name: Enum drift check — models vs DB
        # Catches any migration that leaves the PostgreSQL enum values out of
        # sync with what the SQLAlchemy models declare.  This is the class of
        # bug that caused the production deploy failure: the migration created
        # 'propertytype' with UPPERCASE values but the models store and read
        # lowercase values.  Running this check AFTER flask db upgrade ensures
        # that the schema a fresh database ends up in after the full chain is
        # exactly what the models expect — no more "invalid input value for
        # enum" surprises at deploy time.
        run: python scripts/check_enum_drift.py
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/migration_test_db

  ci-success:
    name: CI success
    # Single required check for branch protection. Skipped path-filtered
    # jobs are allowed; any failure or cancellation fails this gate.
    if: always()
    needs:
      - changes
      - frontend
      - backend
      - migrations
      - validate-workflows
      - deploy-contract
      - duplication-check
      - vps-readiness
      - vps-smoke-test
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate required job results
        run: |
          set -euo pipefail
          echo "Job results:"
          echo "  changes=${{ needs.changes.result }}"
          echo "  frontend=${{ needs.frontend.result }}"
          echo "  backend=${{ needs.backend.result }}"
          echo "  migrations=${{ needs.migrations.result }}"
          echo "  validate-workflows=${{ needs.validate-workflows.result }}"
          echo "  deploy-contract=${{ needs.deploy-contract.result }}"
          echo "  duplication-check=${{ needs.duplication-check.result }}"
          echo "  vps-readiness=${{ needs.vps-readiness.result }}"
          echo "  vps-smoke-test=${{ needs.vps-smoke-test.result }}"

          fail=0
          for result in \
            "${{ needs.changes.result }}" \
            "${{ needs.frontend.result }}" \
            "${{ needs.backend.result }}" \
            "${{ needs.migrations.result }}" \
            "${{ needs.validate-workflows.result }}" \
            "${{ needs.deploy-contract.result }}" \
            "${{ needs.duplication-check.result }}" \
            "${{ needs.vps-readiness.result }}" \
            "${{ needs.vps-smoke-test.result }}"
          do
            if [ "$result" != "success" ] && [ "$result" != "skipped" ]; then
              echo "Unsuccessful job result: $result"
              fail=1
            fi
          done
          if [ "$fail" -ne 0 ]; then
            echo "::error::One or more CI jobs failed or were cancelled."
            exit 1
          fi
          echo "All required CI jobs succeeded or were skipped."
