name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  frontend:
    name: Frontend — typecheck, build, tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        # Retry up to 3 times — transient npm registry network errors (ECONNRESET,
        # ETIMEDOUT) occasionally hit GitHub-hosted runners mid-download.
        run: npm ci || npm ci || npm ci
        working-directory: frontend

      - name: Install optional native dependencies (Linux CI fix)
        # package-lock.json was generated on Windows and omits Linux-specific
        # optional packages. Explicitly install the rollup Linux native binary
        # so vitest and vite build work on ubuntu-latest runners.
        run: npm install --no-save @rollup/rollup-linux-x64-gnu
        working-directory: frontend

      - name: TypeScript type-check
        run: npx tsc --noEmit
        working-directory: frontend

      - name: Run tests (includes App shell smoke test)
        run: npm test
        working-directory: frontend

      - name: Production build
        run: npm run build
        working-directory: frontend

  validate-workflows:
    name: Validate workflow YAML syntax
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate deploy.yml YAML syntax
        run: |
          pip install pyyaml -q
          python3 -c "import yaml; yaml.safe_load(open('.github/workflows/deploy.yml')); print('deploy.yml YAML valid')"

  deploy-contract:
    name: Deploy contract — sudoers and script sync
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate deploy/sudoers contract
        run: python scripts/validate_deploy_contract.py

  vps-readiness:
    name: VPS readiness — deploy infra PRs
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect deploy infra changes
        id: changes
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          if git diff --name-only "${BASE}" HEAD | grep -qE \
            '^(scripts/deploy|scripts/run-vps-readiness|scripts/ci-ensure|scripts/deploy-async-stack|scripts/vps-setup/|\.github/workflows/deploy\.yml)'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Skip — no deploy infra changes
        if: steps.changes.outputs.changed != 'true'
        run: echo "No deploy infra files changed — skipping VPS readiness."

      - name: Set up SSH key
        if: steps.changes.outputs.changed == 'true'
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$VPS_SSH_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy

      - name: Add VPS to known hosts
        if: steps.changes.outputs.changed == 'true'
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_HOST_KEY }}" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Verify VPS readiness (no auto-migrate on PRs)
        if: steps.changes.outputs.changed == 'true'
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          SSH_KEY_PATH: ~/.ssh/id_deploy
        run: |
          chmod +x scripts/run-vps-readiness-check.sh scripts/deploy-async-stack-checks.sh
          scp -i ~/.ssh/id_deploy scripts/run-vps-readiness-check.sh \
            scripts/deploy-async-stack-checks.sh \
            "$VPS_USER@$VPS_HOST:/home/deploy/"
          ssh -i ~/.ssh/id_deploy -o ConnectTimeout=10 "$VPS_USER@$VPS_HOST" \
            "bash /home/deploy/run-vps-readiness-check.sh" \
          || {
            echo "ERROR: Production VPS is not ready for this deploy-infra change."
            echo "Run on VPS as root: sudo bash /home/deploy/app/scripts/vps-setup/migrate-async-stack.sh"
            echo "Or merge after VPS_ROOT_SSH_KEY auto-migrate is configured for deploy workflow."
            exit 1
          }

  vps-smoke-test:
    name: VPS smoke test — backup and readiness
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH key
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$VPS_SSH_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy

      - name: Add VPS to known hosts
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_HOST_KEY }}" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Run backup.sh --check on VPS
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          ssh -i ~/.ssh/id_deploy \
            -o ConnectTimeout=10 \
            $VPS_USER@$VPS_HOST \
            "/home/deploy/backup.sh --check" \
          || {
            echo "ERROR: backup.sh --check failed on VPS."
            exit 1
          }

      - name: Run VPS readiness check
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_ROOT_SSH_KEY: ${{ secrets.VPS_ROOT_SSH_KEY }}
          SSH_KEY_PATH: ~/.ssh/id_deploy
        run: |
          chmod +x scripts/ci-ensure-vps-readiness.sh scripts/run-vps-readiness-check.sh
          VPS_USER="$VPS_USER" VPS_HOST="$VPS_HOST" SSH_KEY_PATH="$SSH_KEY_PATH" \
            VPS_ROOT_SSH_KEY="$VPS_ROOT_SSH_KEY" \
            bash scripts/ci-ensure-vps-readiness.sh

  backend:
    name: Backend — pytest
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt
        working-directory: backend

      - name: Verify Celery worker imports cleanly
        # Imports celery_worker which transitively loads every service, task,
        # and model. A broken import (wrong exception name, missing module,
        # circular dependency) crashes the worker on startup — this catches it
        # before it can reach production and before pytest even runs.
        run: python -c "import celery_worker; print('celery_worker imports OK')"
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          FLASK_ENV: testing
          SECRET_KEY: ci-test-secret-key
          JWT_SECRET_KEY: ci-test-jwt-secret
          CELERY_BROKER_URL: redis://localhost:6379/0
          REDIS_URL: redis://localhost:6379/0

      - name: Lint migration files for dangerous patterns
        # Static analysis — no database needed.
        # Catches patterns that cause production crashes but are invisible in
        # SQLite-based tests: raw_conn.execute(), bind.connection used without
        # unwrapping the pool proxy, etc.
        run: python scripts/lint_migrations.py
        working-directory: backend

      - name: Run tests
        run: pytest
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          FLASK_ENV: testing
          SECRET_KEY: ci-test-secret-key
          JWT_SECRET_KEY: ci-test-jwt-secret

      - name: Create isolated migration test database
        # Create a second PostgreSQL database that pytest never touches.
        # The smoke-test runs flask db upgrade against this clean database so
        # that Alembic revision state from pytest's auto-migrate never
        # interferes with the migration chain validation.
        run: PGPASSWORD=postgres psql -h localhost -U postgres -c "CREATE DATABASE migration_test_db;"

      - name: Validate migration chain (head + root count gate)
        # Runs before any schema change — fails fast if head_count != 1 or root_count != 1.
        # Reports the detected counts and each offending revision identifier so the
        # developer knows exactly which revision broke the chain.
        run: python scripts/check_migration_chain.py
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/migration_test_db
          FLASK_ENV: testing
          SECRET_KEY: ci-test-secret-key
          JWT_SECRET_KEY: ci-test-jwt-secret
          FLASK_APP: app
          REDIS_URL: redis://localhost:6379/0
          CELERY_BROKER_URL: redis://localhost:6379/0
          KIRO_MIGRATION: "1"

      - name: Migration validation — fresh-DB upgrade (PostgreSQL 15, 300s timeout)
        # Migration validation job: runs flask db upgrade against a completely fresh
        # migration_test_db on PostgreSQL 15 (matching production) with a hard 300-second
        # timeout. KIRO_MIGRATION=1 prevents the app factory's auto-upgrade from firing.
        # On any non-zero exit the run fails and the error output is surfaced so the
        # failing revision is visible. No SQLite substitution — PostgreSQL only.
        run: |
          echo "=== Running flask db upgrade (timeout 300s) ==="
          set +e
          timeout 300 flask db upgrade 2>&1 | tee /tmp/migration_output.txt
          EXIT_CODE=${PIPESTATUS[0]}
          set -e
          if [ $EXIT_CODE -ne 0 ]; then
            echo "::error::flask db upgrade failed (exit $EXIT_CODE). Migration output:"
            cat /tmp/migration_output.txt
            exit $EXIT_CODE
          fi
          echo "=== Initial upgrade complete ==="
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/migration_test_db
          FLASK_ENV: testing
          SECRET_KEY: ci-test-secret-key
          JWT_SECRET_KEY: ci-test-jwt-secret
          FLASK_APP: app
          REDIS_URL: redis://localhost:6379/0
          CELERY_BROKER_URL: redis://localhost:6379/0
          KIRO_MIGRATION: "1"

      - name: Migration idempotency + chain re-validation
        # Production never downgrades to base, and the historical pre-consolidation
        # migrations were authored against SQLite/incremental dev state — their
        # downgrade() paths (reverse enum/type casts, batch_alter_table drops) are
        # not reliably runnable to base on a fresh chain.  Instead of a
        # downgrade-to-base round-trip, we validate the two production-relevant
        # reversibility properties: (1) re-running `flask db upgrade` at head is a
        # clean no-op (idempotency — Req 2.6, 8.7), and (2) the chain still
        # resolves to exactly one root + one head afterwards.
        run: |
          echo "=== Idempotent re-run (upgrade again, must be a no-op) ==="
          timeout 300 flask db upgrade 2>&1
          echo "=== Re-validate chain head/root ==="
          python scripts/check_migration_chain.py
          echo "=== Idempotency check complete ==="
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/migration_test_db
          FLASK_ENV: testing
          SECRET_KEY: ci-test-secret-key
          JWT_SECRET_KEY: ci-test-jwt-secret
          FLASK_APP: app
          REDIS_URL: redis://localhost:6379/0
          CELERY_BROKER_URL: redis://localhost:6379/0
          KIRO_MIGRATION: "1"

      - name: Enum drift check — models vs DB
        # Catches any migration that leaves the PostgreSQL enum values out of
        # sync with what the SQLAlchemy models declare.  This is the class of
        # bug that caused the production deploy failure: the migration created
        # 'propertytype' with UPPERCASE values but the models store and read
        # lowercase values.  Running this check AFTER flask db upgrade ensures
        # that the schema a fresh database ends up in after the full chain is
        # exactly what the models expect — no more "invalid input value for
        # enum" surprises at deploy time.
        run: python scripts/check_enum_drift.py
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/migration_test_db
