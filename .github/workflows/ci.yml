name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  frontend:
    name: Frontend — typecheck, build, tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Install optional native dependencies (Linux CI fix)
        # package-lock.json was generated on Windows and omits Linux-specific
        # optional packages. Explicitly install the rollup Linux native binary
        # so vitest and vite build work on ubuntu-latest runners.
        run: npm install --no-save @rollup/rollup-linux-x64-gnu
        working-directory: frontend

      - name: TypeScript type-check
        run: npx tsc --noEmit
        working-directory: frontend

      - name: Run tests (includes App shell smoke test)
        run: npm test
        working-directory: frontend

      - name: Production build
        run: npm run build
        working-directory: frontend

      - name: Validate deploy.yml YAML syntax
        # Catches broken YAML in deploy.yml before it reaches main.
        # A malformed deploy.yml causes GitHub to silently ignore workflow_dispatch
        # and skip automatic deploys — this check prevents that from happening.
        run: python3 -c "import yaml; yaml.safe_load(open('.github/workflows/deploy.yml')); print('deploy.yml YAML valid')"

  backend:
    name: Backend — pytest
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt
        working-directory: backend

      - name: Verify Celery worker imports cleanly
        # Imports celery_worker which transitively loads every service, task,
        # and model. A broken import (wrong exception name, missing module,
        # circular dependency) crashes the worker on startup — this catches it
        # before it can reach production and before pytest even runs.
        run: python -c "import celery_worker; print('celery_worker imports OK')"
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          FLASK_ENV: testing
          SECRET_KEY: ci-test-secret-key
          JWT_SECRET_KEY: ci-test-jwt-secret
          CELERY_BROKER_URL: redis://localhost:6379/0
          REDIS_URL: redis://localhost:6379/0

      - name: Run tests
        run: pytest
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          FLASK_ENV: testing
          SECRET_KEY: ci-test-secret-key
          JWT_SECRET_KEY: ci-test-jwt-secret
