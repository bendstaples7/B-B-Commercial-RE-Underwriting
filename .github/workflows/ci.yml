name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  frontend:
    name: Frontend — typecheck, build, tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        # Retry up to 3 times — transient npm registry network errors (ECONNRESET,
        # ETIMEDOUT) occasionally hit GitHub-hosted runners mid-download.
        run: npm ci || npm ci || npm ci
        working-directory: frontend

      - name: Install optional native dependencies (Linux CI fix)
        # package-lock.json was generated on Windows and omits Linux-specific
        # optional packages. Explicitly install the rollup Linux native binary
        # so vitest and vite build work on ubuntu-latest runners.
        run: npm install --no-save @rollup/rollup-linux-x64-gnu
        working-directory: frontend

      - name: TypeScript type-check
        run: npx tsc --noEmit
        working-directory: frontend

      - name: Run tests (includes App shell smoke test)
        run: npm test
        working-directory: frontend

      - name: Production build
        run: npm run build
        working-directory: frontend

  validate-workflows:
    name: Validate workflow YAML syntax
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate deploy.yml YAML syntax
        # Catches broken YAML in deploy.yml before it reaches main.
        # A malformed deploy.yml causes GitHub to silently ignore workflow_dispatch
        # and skip automatic deploys — this check prevents that from happening.
        # Runs as a separate job so it always executes regardless of frontend failures.
        run: |
          pip install pyyaml -q
          python3 -c "import yaml; yaml.safe_load(open('.github/workflows/deploy.yml')); print('deploy.yml YAML valid')"

  vps-smoke-test:
    name: VPS smoke test — backup connectivity
    runs-on: ubuntu-latest
    # Only run on pushes to main (PRs don't have VPS secrets)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: none

    steps:
      - name: Set up SSH key
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$VPS_SSH_KEY" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy

      - name: Add VPS to known hosts
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_HOST_KEY }}" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Run backup.sh --check on VPS
        # Verifies that backup.sh can connect to PostgreSQL on the VPS.
        # Catches DB connectivity issues (wrong PGUSER, missing .pgpass, etc.)
        # before they block a deploy. Runs after every push to main so regressions
        # are caught immediately rather than at deploy time.
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          ssh -i ~/.ssh/id_deploy \
            -o ConnectTimeout=10 \
            $VPS_USER@$VPS_HOST \
            "/home/deploy/backup.sh --check" \
          || {
            echo "ERROR: backup.sh --check failed on VPS."
            echo "This means the backup system cannot connect to PostgreSQL."
            echo "Check /home/deploy/logs/backup.log on the VPS for details."
            exit 1
          }

  backend:
    name: Backend — pytest
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt
        working-directory: backend

      - name: Verify Celery worker imports cleanly
        # Imports celery_worker which transitively loads every service, task,
        # and model. A broken import (wrong exception name, missing module,
        # circular dependency) crashes the worker on startup — this catches it
        # before it can reach production and before pytest even runs.
        run: python -c "import celery_worker; print('celery_worker imports OK')"
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          FLASK_ENV: testing
          SECRET_KEY: ci-test-secret-key
          JWT_SECRET_KEY: ci-test-jwt-secret
          CELERY_BROKER_URL: redis://localhost:6379/0
          REDIS_URL: redis://localhost:6379/0

      - name: Lint migration files for dangerous patterns
        # Static analysis — no database needed.
        # Catches patterns that cause production crashes but are invisible in
        # SQLite-based tests: raw_conn.execute(), bind.connection used without
        # unwrapping the pool proxy, etc.
        run: python scripts/lint_migrations.py
        working-directory: backend

      - name: Run tests
        run: pytest
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
          FLASK_ENV: testing
          SECRET_KEY: ci-test-secret-key
          JWT_SECRET_KEY: ci-test-jwt-secret

      - name: Create isolated migration test database
        # Create a second PostgreSQL database that pytest never touches.
        # The smoke-test runs flask db upgrade against this clean database so
        # that Alembic revision state from pytest's auto-migrate never
        # interferes with the migration chain validation.
        run: PGPASSWORD=postgres psql -h localhost -U postgres -c "CREATE DATABASE migration_test_db;"

      - name: Validate migration chain (head + root count gate)
        # Runs before any schema change — fails fast if head_count != 1 or root_count != 1.
        # Reports the detected counts and each offending revision identifier so the
        # developer knows exactly which revision broke the chain.
        run: python scripts/check_migration_chain.py
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/migration_test_db
          FLASK_ENV: testing
          SECRET_KEY: ci-test-secret-key
          JWT_SECRET_KEY: ci-test-jwt-secret
          FLASK_APP: app
          REDIS_URL: redis://localhost:6379/0
          CELERY_BROKER_URL: redis://localhost:6379/0
          KIRO_MIGRATION: "1"

      - name: Migration validation — fresh-DB upgrade (PostgreSQL 15, 300s timeout)
        # Migration validation job: runs flask db upgrade against a completely fresh
        # migration_test_db on PostgreSQL 15 (matching production) with a hard 300-second
        # timeout. KIRO_MIGRATION=1 prevents the app factory's auto-upgrade from firing.
        # On any non-zero exit the run fails and the error output is surfaced so the
        # failing revision is visible. No SQLite substitution — PostgreSQL only.
        run: |
          echo "=== Running flask db upgrade (timeout 300s) ==="
          set +e
          timeout 300 flask db upgrade 2>&1 | tee /tmp/migration_output.txt
          EXIT_CODE=${PIPESTATUS[0]}
          set -e
          if [ $EXIT_CODE -ne 0 ]; then
            echo "::error::flask db upgrade failed (exit $EXIT_CODE). Migration output:"
            cat /tmp/migration_output.txt
            exit $EXIT_CODE
          fi
          echo "=== Initial upgrade complete ==="
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/migration_test_db
          FLASK_ENV: testing
          SECRET_KEY: ci-test-secret-key
          JWT_SECRET_KEY: ci-test-jwt-secret
          FLASK_APP: app
          REDIS_URL: redis://localhost:6379/0
          CELERY_BROKER_URL: redis://localhost:6379/0
          KIRO_MIGRATION: "1"

      - name: Migration round-trip (upgrade → downgrade base → upgrade)
        # Validates full reversibility: downgrades to base then re-applies the full
        # chain, asserting exit 0 at every step and a final schema identical to a
        # direct fresh-DB upgrade. Each step is capped at 300 seconds.
        run: |
          echo "=== Downgrade to base ==="
          timeout 300 flask db downgrade base 2>&1
          echo "=== Re-upgrade to head ==="
          timeout 300 flask db upgrade 2>&1
          echo "=== Round-trip complete ==="
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/migration_test_db
          FLASK_ENV: testing
          SECRET_KEY: ci-test-secret-key
          JWT_SECRET_KEY: ci-test-jwt-secret
          FLASK_APP: app
          REDIS_URL: redis://localhost:6379/0
          CELERY_BROKER_URL: redis://localhost:6379/0
          KIRO_MIGRATION: "1"
